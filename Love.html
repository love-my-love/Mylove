<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта, моя Манюня</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:     #fdf6ee;
  --ivory:     #fdfaf5;
  --rose:      #c07080;
  --deep-rose: #8b3a52;
  --wine:      #52182e;
  --wine-dark: #3a0f1f;
  --gold:      #c8a86b;
  --gold-lt:   #e8d5a3;
  --text:      #3d1a27;
  --text-mid:  #7a4058;
  --text-pale: #a87090;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Lora', serif;
  background: var(--cream);
  color: var(--text);
  overflow-x: hidden;
}

/* ── CURSOR ─────────────────────────── */
#cursor {
  position: fixed;
  width: 20px; height: 20px;
  border: 1.5px solid var(--rose);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  transition: transform 0.15s ease;
  mix-blend-mode: multiply;
}
#cursor-dot {
  position: fixed;
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
}

/* ── PETALS ──────────────────────────── */
#petals-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 2;
}

/* ── SPLASH ──────────────────────────── */
#splash {
  position: fixed; inset: 0; z-index: 9000;
  background: var(--wine-dark);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  cursor: pointer;
  transition: opacity 1.8s ease, visibility 1.8s;
}
#splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }

.s-ring {
  position: absolute;
  border: 1px solid rgba(200,168,107,0.1);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation: sRingPulse 4s ease-out infinite;
}
.s-ring:nth-child(1) { width: 260px; height: 260px; }
.s-ring:nth-child(2) { width: 420px; height: 420px; animation-delay: 0.9s; }
.s-ring:nth-child(3) { width: 580px; height: 580px; animation-delay: 1.8s; }
@keyframes sRingPulse {
  0%   { opacity: 0.5; transform: translate(-50%,-50%) scale(0.75); }
  100% { opacity: 0;   transform: translate(-50%,-50%) scale(1.4); }
}

.s-bar {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin-bottom: 2.5rem;
  animation: sBarWiden 1.2s 0.2s ease forwards;
}
@keyframes sBarWiden { to { width: clamp(120px, 25vw, 220px); } }

.s-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(4rem, 13vw, 9rem);
  color: var(--gold-lt);
  line-height: 1.05;
  text-align: center;
  animation: fadeUp 1s 0.3s both;
  text-shadow: 0 0 80px rgba(200,168,107,0.55);
}
.s-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.95rem, 2.5vw, 1.5rem);
  color: rgba(253,250,245,0.5);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-top: 1.6rem;
  animation: fadeUp 1s 0.55s both;
}
.s-progress {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin-top: 3.5rem;
  animation: sProgress 3s 0.3s ease forwards;
}
@keyframes sProgress { to { width: clamp(180px, 40vw, 380px); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(25px); }
  to   { opacity: 1; transform: none; }
}

/* ── REVEAL ──────────────────────────── */
.reveal {
  opacity: 0; transform: translateY(45px);
  transition: opacity 1.1s cubic-bezier(0.22,0.61,0.36,1),
              transform 1.1s cubic-bezier(0.22,0.61,0.36,1);
}
.reveal.visible { opacity: 1; transform: none; }
.d1 { transition-delay: 0.12s; }
.d2 { transition-delay: 0.24s; }
.d3 { transition-delay: 0.36s; }
.d4 { transition-delay: 0.48s; }

/* ── DIVIDER ─────────────────────────── */
.divider {
  display: flex; align-items: center; gap: 1rem;
  max-width: 420px; margin: 0 auto 3.5rem;
}
.divider::before {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
.d-gem {
  width: 7px; height: 7px;
  border: 1px solid var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}
.d-gem-dim { border-color: rgba(200,168,107,0.4); }

/* ── SECTION LABELS ──────────────────── */
.s-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  font-size: clamp(0.72rem, 1.5vw, 0.9rem);
  color: var(--gold);
  margin-bottom: 0.9rem;
  display: block;
}
.s-heading {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(3.5rem, 8vw, 7rem);
  color: var(--deep-rose);
  line-height: 1;
  margin-bottom: 0.7rem;
}
.s-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1rem, 2.4vw, 1.45rem);
  color: var(--text-pale);
  letter-spacing: 0.05em;
  margin-bottom: 3.5rem;
}

/* ── SVG HEART PULSE ─────────────────── */
.heart-pulse {
  display: block; margin: 0 auto 2.8rem;
  filter: drop-shadow(0 8px 40px rgba(139,58,82,0.48));
  animation: hpulse 3.5s ease-in-out infinite;
}
@keyframes hpulse {
  0%,100% { transform: scale(1); }
  14%     { transform: scale(1.13); }
  28%     { transform: scale(1); }
  42%     { transform: scale(1.08); }
  56%     { transform: scale(1); }
}

/* ── HERO ────────────────────────────── */
#hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 6rem 2rem; position: relative;
  background:
    radial-gradient(ellipse 80% 55% at 18% 28%, rgba(192,112,128,0.1), transparent 60%),
    radial-gradient(ellipse 60% 75% at 82% 72%, rgba(200,168,107,0.09), transparent 60%),
    var(--cream);
}

/* floating bg ornaments */
.hf { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.hf svg {
  position: absolute;
  opacity: 0.07;
  animation: hfDrift 20s ease-in-out infinite;
}
.hf svg:nth-child(1) { top: 10%; left: 5%;  width: 80px;  animation-duration: 18s; }
.hf svg:nth-child(2) { top: 70%; left: 88%; width: 55px;  animation-duration: 23s; animation-delay: -6s; }
.hf svg:nth-child(3) { top: 82%; left: 8%;  width: 42px;  animation-duration: 15s; animation-delay: -10s; }
.hf svg:nth-child(4) { top: 18%; left: 82%; width: 68px;  animation-duration: 25s; animation-delay: -3s; }
@keyframes hfDrift {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  25%     { transform: translate(10px,-16px) rotate(5deg); }
  50%     { transform: translate(-7px,9px) rotate(-4deg); }
  75%     { transform: translate(13px,5px) rotate(3deg); }
}

.hero-date {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  font-size: clamp(0.78rem, 1.6vw, 0.95rem);
  margin-bottom: 2rem;
}
.hero-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(5rem, 15vw, 13rem);
  color: var(--deep-rose);
  line-height: 0.88;
  margin-bottom: 1.4rem;
}
.hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.6rem, 4.5vw, 3.2rem);
  color: var(--rose);
  margin-bottom: 3.8rem;
  letter-spacing: 0.04em;
}

.btn-love {
  display: inline-flex; align-items: center; gap: 0.75rem;
  background: var(--wine);
  color: var(--gold-lt);
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1rem, 2.2vw, 1.4rem);
  letter-spacing: 0.12em;
  padding: 1.1rem 3.8rem;
  border: 1px solid rgba(200,168,107,0.4);
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: background 0.4s, transform 0.35s, box-shadow 0.4s;
}
.btn-love::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(232,213,163,0.2), transparent);
  transform: translateX(-120%);
  transition: transform 0.7s ease;
}
.btn-love:hover::before  { transform: translateX(120%); }
.btn-love:hover {
  background: var(--deep-rose);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(82,24,46,0.42);
}
.btn-love svg { flex-shrink: 0; }

/* ── POEM ────────────────────────────── */
#poem {
  padding: 7rem 2rem;
  background: var(--wine);
  position: relative; overflow: hidden; text-align: center;
}
#poem::before, #poem::after {
  content: ''; position: absolute;
  left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
#poem::before { top: 0; }
#poem::after  { bottom: 0; }

.p-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(200,168,107,0.06);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}
.p-ring:nth-child(1) { width: 440px; height: 440px; }
.p-ring:nth-child(2) { width: 680px; height: 680px; }

.poem-icon { width: 26px; height: 26px; margin: 0 auto 2rem; opacity: 0.5; }
.poem-body {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: clamp(1.1rem, 2.7vw, 1.85rem);
  color: rgba(253,250,245,0.86);
  line-height: 2.3;
  max-width: 600px;
  margin: 0 auto;
}
.poem-body em {
  display: block;
  transition: color 0.3s;
  font-style: normal;
}
.poem-body em:hover { color: var(--gold-lt); }
.poem-sig {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--gold);
  font-size: 1.05rem;
  letter-spacing: 0.2em;
  margin-top: 2.8rem;
  opacity: 0.7;
}

/* ── QUALITIES ───────────────────────── */
#qualities {
  padding: 7rem 2rem;
  background: var(--ivory);
  text-align: center;
}
.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
  gap: 1.3rem;
  max-width: 860px; margin: 0 auto;
}
.q-card {
  padding: 2.8rem 1.5rem 2.2rem;
  border: 1px solid rgba(200,168,107,0.2);
  background: white;
  position: relative; overflow: hidden;
  transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.5s;
}
.q-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(145deg, var(--wine), var(--deep-rose));
  transform: scaleY(0); transform-origin: bottom;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 0;
}
.q-card:hover { transform: translateY(-10px); box-shadow: 0 28px 70px rgba(82,24,46,0.18); }
.q-card:hover::before { transform: scaleY(1); }
.q-card:hover .q-icon, .q-card:hover .q-title { color: var(--gold-lt); }
.q-card:hover .q-desc { color: rgba(232,213,163,0.68); }
.q-icon {
  position: relative; z-index: 1;
  width: 38px; height: 38px; margin: 0 auto 1.1rem;
  color: var(--rose);
  transition: color 0.4s;
}
.q-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; font-weight: 600;
  color: var(--deep-rose); margin-bottom: 0.45rem;
  position: relative; z-index: 1; transition: color 0.4s;
}
.q-desc {
  font-size: 0.86rem; color: var(--text-pale); font-style: italic;
  position: relative; z-index: 1; transition: color 0.4s; line-height: 1.65;
}

/* ── GAME ────────────────────────────── */
#game {
  padding: 7rem 2rem;
  background:
    radial-gradient(ellipse at 12% 50%, rgba(192,112,128,0.07), transparent 50%),
    radial-gradient(ellipse at 88% 50%, rgba(200,168,107,0.07), transparent 50%),
    var(--cream);
  text-align: center;
}
.game-score {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; color: var(--gold);
  letter-spacing: 0.18em; margin-bottom: 3rem;
}
#memoryGrid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px; max-width: 660px;
  margin: 0 auto 3rem;
}
@media (max-width: 520px) { #memoryGrid { grid-template-columns: repeat(2,1fr); } }

.mc { aspect-ratio: 1; perspective: 1000px; cursor: pointer; }
.mc-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.175,0.885,0.32,1.275);
}
.mc.flipped .mc-inner { transform: rotateY(180deg); }
.mc-f, .mc-b {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 3px; overflow: hidden;
}
.mc-f {
  background: var(--wine);
  border: 1px solid rgba(200,168,107,0.22);
  display: flex; align-items: center; justify-content: center;
}
.mc-f svg { width: 26px; height: 26px; opacity: 0.3; color: var(--gold); }
.mc-b { transform: rotateY(180deg); }
.mc-b img { width: 100%; height: 100%; object-fit: cover; }
.mc.matched .mc-inner { outline: 1.5px solid var(--gold); }

.btn-outline {
  display: inline-flex; align-items: center; gap: 0.55rem;
  border: 1px solid var(--deep-rose); color: var(--deep-rose);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; letter-spacing: 0.12em;
  padding: 0.85rem 2.5rem;
  cursor: pointer; background: transparent;
  transition: all 0.4s ease;
}
.btn-outline:hover {
  background: var(--deep-rose); color: var(--ivory);
  transform: translateY(-3px);
  box-shadow: 0 14px 42px rgba(139,58,82,0.22);
}

/* ── GALLERY ─────────────────────────── */
#gallery {
  padding: 7rem 2rem;
  background: var(--wine);
  text-align: center;
}
#gallery .s-label   { color: rgba(232,213,163,0.6); }
#gallery .s-heading { color: var(--gold-lt); }
#gallery .s-sub     { color: rgba(253,250,245,0.42); }
#gallery .divider::before { background: linear-gradient(90deg, transparent, rgba(200,168,107,0.38)); }
#gallery .divider::after  { background: linear-gradient(90deg, rgba(200,168,107,0.38), transparent); }

.g-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  grid-auto-rows: 190px;
  gap: 8px;
  max-width: 980px; margin: 0 auto;
}
@media (max-width: 680px) {
  .g-grid { grid-template-columns: repeat(2,1fr); grid-auto-rows: 160px; }
}
.gi { position: relative; overflow: hidden; cursor: zoom-in; }
.gi:nth-child(1) { grid-column: span 2; grid-row: span 2; }
.gi img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.7s;
  filter: brightness(0.88) saturate(0.75);
}
.gi:hover img { transform: scale(1.08); filter: brightness(1) saturate(1); }
.gi-ov {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(40,8,20,0.75) 0%, transparent 52%);
  opacity: 0; transition: opacity 0.5s;
  display: flex; align-items: flex-end; padding: 1.1rem 0.9rem;
}
.gi:hover .gi-ov { opacity: 1; }
.gi-lbl {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; color: var(--gold-lt);
  font-size: 0.9rem; letter-spacing: 0.12em;
  transform: translateY(7px);
  transition: transform 0.4s;
}
.gi:hover .gi-lbl { transform: none; }

/* ── LIGHTBOX ─────────────────────────── */
#lightbox {
  position: fixed; inset: 0; z-index: 8000;
  background: rgba(22,5,14,0.96);
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(14px);
}
#lightbox.open { display: flex; }
#lb-img {
  max-width: 88vw; max-height: 86vh; object-fit: contain;
  transition: opacity 0.22s;
}
#lb-close {
  position: absolute; top: 1.8rem; right: 2.2rem;
  background: none; border: none;
  color: var(--gold-lt); font-size: 1.7rem;
  cursor: pointer; line-height: 1;
  font-family: 'Cormorant Garamond', serif;
  transition: transform 0.35s, color 0.3s;
}
#lb-close:hover { transform: rotate(90deg); color: var(--gold); }
#lb-prev, #lb-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(82,24,46,0.5);
  border: 1px solid rgba(200,168,107,0.28);
  color: var(--gold-lt); font-size: 1.5rem;
  width: 46px; height: 46px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.3s;
}
#lb-prev { left: 1.2rem; }
#lb-next { right: 1.2rem; }
#lb-prev:hover, #lb-next:hover { background: var(--deep-rose); }

/* ── FINAL ───────────────────────────── */
#final {
  padding: 9rem 2rem 7rem; text-align: center;
  background:
    radial-gradient(ellipse 65% 55% at 50% 50%, rgba(192,112,128,0.12), transparent),
    var(--ivory);
}
.final-heart {
  display: block; margin: 0 auto 3rem;
  animation: hpulse 3.5s ease-in-out infinite;
  filter: drop-shadow(0 10px 40px rgba(139,58,82,0.52));
}
.final-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(3.5rem, 9vw, 8rem);
  color: var(--deep-rose);
  line-height: 1.05; margin-bottom: 2rem;
}
.final-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.2rem, 2.8vw, 1.85rem);
  color: var(--text-mid); max-width: 540px;
  margin: 0 auto 4rem; line-height: 2;
}
.final-sig {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2rem, 5vw, 3.2rem);
  color: var(--gold); display: block; margin-top: 3.5rem;
}
.final-date {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 0.92rem;
  color: var(--text-pale); letter-spacing: 0.2em;
  margin-top: 0.7rem; opacity: 0.58;
}

/* ── MUSIC BTN ───────────────────────── */
#musicBtn {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 5000;
  width: 54px; height: 54px;
  background: var(--wine); border: 1px solid rgba(200,168,107,0.45);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(40,8,20,0.55);
  transition: transform 0.4s, background 0.3s;
}
#musicBtn:hover { transform: scale(1.13); background: var(--deep-rose); }
#musicBtn svg { width: 20px; height: 20px; color: var(--gold-lt); }
.mr {
  position: absolute; width: 100%; height: 100%;
  border: 1px solid rgba(200,168,107,0.3); border-radius: 50%;
  animation: mRipple 2.5s ease-out infinite; opacity: 0;
}
.mr:nth-child(2) { animation-delay: 0.75s; }
.mr:nth-child(3) { animation-delay: 1.5s; }
@keyframes mRipple {
  0%   { transform: scale(1); opacity: 0.45; }
  100% { transform: scale(2.6); opacity: 0; }
}

/* grain */
body::after {
  content: ''; position: fixed; inset: 0;
  pointer-events: none; z-index: 3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.35;
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-dot"></div>
<canvas id="petals-canvas"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="s-ring"></div>
  <div class="s-ring"></div>
  <div class="s-ring"></div>
  <div class="s-bar"></div>
  <div class="s-title">С 8 Марта,<br>моя Манюня</div>
